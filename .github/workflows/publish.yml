name: Publish

# Triggered automatically when release-please pushes a version tag,
# or manually for emergency re-publishes.
#
# Runner selection (three levels, first match wins):
#   1. workflow_dispatch input  `runner`       – per-run override
#   2. repository variable      PUBLISH_RUNNER  – set in Settings → Variables
#   3. fallback                 ubuntu-latest
#
# Self-hosted requirements:
#   - Node.js ≥ 20 and pnpm ≥ 10 installed, OR leave setup to the actions below
#   - Network access to registry.npmjs.org and npm.pkg.github.com
#   - Network access to token.actions.githubusercontent.com (OIDC for npm provenance)
#     If OIDC is unavailable, set publishConfig.provenance to false in each package.json
#     and remove the id-token: write permission.
on:
  push:
    tags:
      - 'mcp-swetrix-events*'
      - 'mcp-swetrix-admin*'
      - 'mcp-swetrix-statistics*'
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "@kieksme/mcp-swetrix-events"
          - "@kieksme/mcp-swetrix-admin"
          - "@kieksme/mcp-swetrix-statistics"
      runner:
        description: "Runner override (e.g. self-hosted or ubuntu-latest)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write   # OIDC token for npm provenance — requires token.actions.githubusercontent.com
  packages: write   # publish to GitHub Packages

jobs:
  publish:
    runs-on: ${{ inputs.runner || vars.PUBLISH_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package name
        id: pkg
        run: |
          NAME=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == mcp-swetrix-events* ]]; then
              NAME="@kieksme/mcp-swetrix-events"
            elif [[ "$TAG" == mcp-swetrix-admin* ]]; then
              NAME="@kieksme/mcp-swetrix-admin"
            elif [[ "$TAG" == mcp-swetrix-statistics* ]]; then
              NAME="@kieksme/mcp-swetrix-statistics"
            else
              echo "Unknown tag: $TAG" && exit 1
            fi
          else
            NAME="${{ inputs.package }}"
          fi

          case "$NAME" in
            "@kieksme/mcp-swetrix-events")
              DIR="packages/swetrix-events-mcp-server"
              ;;
            "@kieksme/mcp-swetrix-admin")
              DIR="packages/swetrix-admin-mcp-server"
              ;;
            "@kieksme/mcp-swetrix-statistics")
              DIR="packages/swetrix-statistics-mcp-server"
              ;;
            *)
              echo "Unknown package: $NAME" && exit 1
              ;;
          esac

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" install
      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" test

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --provenance --access public

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        # --provenance=false: GitHub Packages does not support npm provenance attestation
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --registry=https://npm.pkg.github.com --provenance=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
