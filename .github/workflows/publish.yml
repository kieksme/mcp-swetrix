name: Publish (manual)

# Emergency / re-publish workflow.
# Automatic publishing on release is handled by release-please.yml.
#
# Why no release: types: [published] trigger here?
# Releases created by release-please use GITHUB_TOKEN, which does not
# fire cross-workflow events by design (GitHub prevents accidental loops).
# The publish job therefore lives in release-please.yml where it has
# direct access to the release-please outputs.
#
# Runner selection (first match wins):
#   1. workflow_dispatch input `runner`       – per-run override
#   2. repository variable     PUBLISH_RUNNER – set in Settings → Variables
#   3. fallback                ubuntu-latest
#
# Self-hosted requirements:
#   - Network access to registry.npmjs.org and npm.pkg.github.com
#   - Network access to token.actions.githubusercontent.com (OIDC for npm provenance)
#     If OIDC is unavailable, set publishConfig.provenance to false in each
#     package.json and remove the id-token: write permission below.
#
# NPM_TOKEN must be an Automation token (npmjs.com → Access Tokens) scoped to
# the @kieksme org. A Granular token cannot publish packages created after the
# token was issued.
on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "@kieksme/swetrix-events-mcp"
          - "@kieksme/swetrix-admin-mcp"
          - "@kieksme/swetrix-statistics-mcp"
      runner:
        description: "Runner override (e.g. self-hosted or ubuntu-latest)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write   # OIDC token for npm provenance — requires token.actions.githubusercontent.com
  packages: write   # publish to GitHub Packages

jobs:
  publish:
    runs-on: ${{ inputs.runner || vars.PUBLISH_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package name and directory
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # release-please tag format: <component><version>  e.g. mcp-swetrix-events1.2.0
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == mcp-swetrix-events* ]]; then
              NAME="@kieksme/swetrix-events-mcp"
            elif [[ "$TAG" == mcp-swetrix-admin* ]]; then
              NAME="@kieksme/swetrix-admin-mcp"
            elif [[ "$TAG" == mcp-swetrix-statistics* ]]; then
              NAME="@kieksme/swetrix-statistics-mcp"
            else
              echo "Release tag '$TAG' does not match any known package — skipping." && exit 0
            fi
          else
            NAME="${{ inputs.package }}"
          fi

          case "$NAME" in
            "@kieksme/swetrix-events-mcp")     DIR="packages/swetrix-events-mcp-server" ;;
            "@kieksme/swetrix-admin-mcp")      DIR="packages/swetrix-admin-mcp-server"  ;;
            "@kieksme/swetrix-statistics-mcp") DIR="packages/swetrix-statistics-mcp-server" ;;
            *) echo "Unknown package: $NAME" && exit 1 ;;
          esac

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR"   >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" install
      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" test

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        # --no-provenance: GitHub Packages does not support npm provenance attestation
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --no-provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
