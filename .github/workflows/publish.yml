name: Publish (manual)

# Emergency / re-publish workflow.
# Normal publishing is handled automatically by release-please.yml.
on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "@kieksme/mcp-swetrix-events"
          - "@kieksme/mcp-swetrix-admin"
          - "@kieksme/mcp-swetrix-statistics"

permissions:
  contents: read
  id-token: write
  packages: write       # publish to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve directory
        id: dir
        run: |
          case "${{ inputs.package }}" in
            "@kieksme/mcp-swetrix-events")     echo "path=packages/swetrix-events-mcp-server" >> "$GITHUB_OUTPUT" ;;
            "@kieksme/mcp-swetrix-admin")      echo "path=packages/swetrix-admin-mcp-server"  >> "$GITHUB_OUTPUT" ;;
            "@kieksme/mcp-swetrix-statistics") echo "path=packages/swetrix-statistics-mcp-server" >> "$GITHUB_OUTPUT" ;;
          esac

      - run: pnpm --filter "${{ inputs.package }}" install
      - run: pnpm --filter "${{ inputs.package }}" test
      - name: Publish to npm
        run: pnpm --filter "${{ inputs.package }}" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        run: pnpm --filter "${{ inputs.package }}" publish --no-git-checks --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
