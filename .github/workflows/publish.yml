name: Publish

# Triggered automatically when release-please pushes a version tag,
# or manually for emergency re-publishes.
#
# Runner selection (three levels, first match wins):
#   1. workflow_dispatch input  `runner`       – per-run override
#   2. repository variable      PUBLISH_RUNNER  – set in Settings → Variables
#   3. fallback                 ubuntu-latest
#
# Self-hosted requirements:
#   - Node.js ≥ 20 and pnpm ≥ 10 installed, OR leave setup to the actions below
#   - Network access to registry.npmjs.org and npm.pkg.github.com
#   - Network access to token.actions.githubusercontent.com (OIDC for npm provenance)
#     If OIDC is unavailable, set publishConfig.provenance to false in each package.json
#     and remove the id-token: write permission.
on:
  push:
    tags:
      - 'mcp-swetrix-events*'
      - 'mcp-swetrix-admin*'
      - 'mcp-swetrix-statistics*'
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "@kieksme/swetrix-events-mcp"
          - "@kieksme/swetrix-admin-mcp"
          - "@kieksme/swetrix-statistics-mcp"
      runner:
        description: "Runner override (e.g. self-hosted or ubuntu-latest)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write   # OIDC token for npm provenance — requires token.actions.githubusercontent.com
  packages: write   # publish to GitHub Packages

jobs:
  publish:
    runs-on: ${{ inputs.runner || vars.PUBLISH_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package name
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == mcp-swetrix-events* ]]; then
              echo "name=@kieksme/swetrix-events-mcp" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == mcp-swetrix-admin* ]]; then
              echo "name=@kieksme/swetrix-admin-mcp" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == mcp-swetrix-statistics* ]]; then
              echo "name=@kieksme/swetrix-statistics-mcp" >> "$GITHUB_OUTPUT"
            else
              echo "Unknown tag: $TAG" && exit 1
            fi
          else
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" install
      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" test

      - name: Publish to npm
        run: pnpm --filter "${{ steps.pkg.outputs.name }}" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        # --no-provenance: GitHub Packages does not support npm provenance attestation
        run: pnpm --filter "${{ steps.pkg.outputs.name }}" publish --no-git-checks --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
