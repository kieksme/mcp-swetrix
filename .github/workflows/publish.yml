name: Publish

# Triggered automatically when release-please pushes a version tag,
# or manually for emergency re-publishes.
on:
  push:
    tags:
      - 'mcp-swetrix-events*'
      - 'mcp-swetrix-admin*'
      - 'mcp-swetrix-statistics*'
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "@kieksme/mcp-swetrix-events"
          - "@kieksme/mcp-swetrix-admin"
          - "@kieksme/mcp-swetrix-statistics"

permissions:
  contents: read
  id-token: write       # npm provenance attestation
  packages: write       # publish to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package name
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == mcp-swetrix-events* ]]; then
              echo "name=@kieksme/mcp-swetrix-events" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == mcp-swetrix-admin* ]]; then
              echo "name=@kieksme/mcp-swetrix-admin" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == mcp-swetrix-statistics* ]]; then
              echo "name=@kieksme/mcp-swetrix-statistics" >> "$GITHUB_OUTPUT"
            else
              echo "Unknown tag: $TAG" && exit 1
            fi
          else
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" install
      - run: pnpm --filter "${{ steps.pkg.outputs.name }}" test

      - name: Publish to npm
        run: pnpm --filter "${{ steps.pkg.outputs.name }}" publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        run: pnpm --filter "${{ steps.pkg.outputs.name }}" publish --no-git-checks --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
