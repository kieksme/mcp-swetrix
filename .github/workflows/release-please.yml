name: Release Please

# Runs on every push to main.
# Release Please opens/updates a release PR per changed package.
# When that PR is merged, it creates a GitHub Release and tag –
# which automatically triggers publish.yml for the affected package.
#
# Runner selection:
#   repository variable RELEASE_PLEASE_RUNNER  – set in Settings → Variables
#   fallback:           ubuntu-latest
#   Note: this job only calls the GitHub API; a self-hosted runner is rarely needed
#   unless the environment enforces outbound traffic through a corporate proxy.
on:
  push:
    branches: [main]

permissions:
  contents: write       # create releases & tags
  pull-requests: write  # open & update release PRs

jobs:
  release-please:
    runs-on: ${{ vars.RELEASE_PLEASE_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
