name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - swetrix-events-mcp-server
          # swetrix-statistics-mcp-server  # uncomment when implemented
          # swetrix-admin-mcp-server        # uncomment when implemented

    name: "${{ matrix.package }}"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm --filter ${{ matrix.package }} install

      - name: Typecheck
        run: pnpm --filter ${{ matrix.package }} typecheck

      - name: Build
        run: pnpm --filter ${{ matrix.package }} build

      - name: Test
        run: pnpm --filter ${{ matrix.package }} test
        env:
          SWETRIX_API_KEY: ${{ secrets.SWETRIX_API_KEY }}
